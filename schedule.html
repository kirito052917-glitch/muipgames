<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スケジュール | むいぴー</title>
<link rel="icon" type="image/png" href="Images/favicon.png">
<link rel="apple-touch-icon" href="Images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-main: #4a90d9;
    --blue-deep: #1d3a5f;
    --blue-bright: #a8d4ff;
    --blue-border: rgba(120, 180, 240, 0.5);
    --panel-light: rgba(255, 255, 255, 0.88);
    --accent: #ffb85c;
    --text-on-dark: #cfe3f7;
    --text-soft: #7f9db8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    color: var(--blue-deep);
    font-family: 'DotGothic16', sans-serif;
    font-size: 18px;
    line-height: 1.8;
    background: linear-gradient(180deg,
      #0a1226 0%, #0e1c3a 35%, #16294e 65%, #1b3055 100%);
    background-attachment: fixed;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ===== 夜空の背景 ===== */
  .bg-stars { position: fixed; inset: 0; z-index: -3; pointer-events: none; }
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.9; transform: scale(1); }
    50%      { opacity: 0.2; transform: scale(0.7); }
  }
  .bg-moon {
    position: fixed; top: 7%; right: 10%;
    width: 90px; height: 90px; border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #fdf6e3, #e8ddb8 70%);
    box-shadow: 0 0 50px rgba(253,246,227,0.4), 0 0 120px rgba(253,246,227,0.15);
    z-index: -3; pointer-events: none;
  }
  .bg-moon::before, .bg-moon::after {
    content: ""; position: absolute; border-radius: 50%;
    background: rgba(190, 178, 140, 0.5);
  }
  .bg-moon::before { width: 18px; height: 18px; top: 28%; left: 22%; }
  .bg-moon::after  { width: 12px; height: 12px; top: 58%; left: 55%; }
  .bg-forest {
    position: fixed; left: 0; right: 0; bottom: 0;
    z-index: -2; pointer-events: none; line-height: 0;
  }
  .bg-forest svg { width: 100%; height: auto; display: block; }

  header, main, footer { position: relative; z-index: 1; }

  /* ===== ヘッダー ===== */
  header { text-align: center; padding: 32px 16px 16px; }
  .site-title {
    font-family: 'Press Start 2P', 'DotGothic16', monospace;
    font-size: clamp(16px, 3.5vw, 26px);
    color: var(--blue-bright);
    text-shadow: 0 0 16px rgba(140,190,255,0.5), 2px 2px 4px rgba(10,18,38,0.9);
    letter-spacing: 2px;
  }
  header > p {
    color: var(--text-on-dark); margin-top: 8px;
    text-shadow: 1px 1px 3px rgba(10,18,38,0.9);
  }
  nav {
    display: flex; justify-content: center; gap: 12px;
    flex-wrap: wrap; margin-top: 20px;
  }
  .pixel-btn {
    display: inline-block; padding: 10px 20px;
    background: rgba(255,255,255,0.92); color: var(--blue-deep);
    text-decoration: none;
    border: 2px solid var(--blue-border); border-radius: 9999px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    transition: transform .15s, box-shadow .15s, background .2s, color .2s;
    font-size: 16px; font-family: 'DotGothic16', sans-serif; cursor: pointer;
  }
  .pixel-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(74,144,217,0.45);
    background: var(--blue-main); color: #fff;
  }
  .pixel-btn.active { background: var(--blue-main); color: #fff; }

  /* ===== メイン ===== */
  main { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }

  .week-tabs {
    display: flex; justify-content: center; gap: 10px; margin-bottom: 16px;
  }
  .week-range {
    text-align: center; color: var(--text-on-dark);
    text-shadow: 1px 1px 3px rgba(10,18,38,0.9);
    font-size: 18px; margin-bottom: 26px;
  }

  .schedule-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
  }
  .day-card {
    background: var(--panel-light);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 2px solid var(--blue-border); border-radius: 18px;
    overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    transition: transform .15s;
  }
  .day-card:hover { transform: translateY(-3px); }
  .day-header {
    background: linear-gradient(90deg, #4a90d9, #6fb0e8);
    color: #fff; padding: 8px 14px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 15px; text-shadow: 1px 1px 0 rgba(20,50,90,0.4);
  }
  .day-header .dow { font-family: 'Press Start 2P', monospace; font-size: 12px; }
  .day-body { padding: 16px 14px; }
  .day-body .time {
    font-family: 'Press Start 2P', monospace; font-size: 13px;
    color: #2264a5; margin-bottom: 8px;
  }
  .day-body .time.tbd-time { color: #b08a3e; }
  .day-body .title { font-size: 17px; }

  /* 複数枠 */
  .slot + .slot {
    margin-top: 12px; padding-top: 12px;
    border-top: 2px dashed rgba(74, 144, 217, 0.3);
  }

  /* お休み */
  .day-card.off { opacity: 0.5; }
  .day-card.off:hover { transform: none; }
  .day-card.off .day-body { text-align: center; color: var(--text-soft); padding: 22px 14px; }

  /* 未定 */
  .day-card.tbd { border-style: dashed; }
  .day-card.tbd .day-header { background: linear-gradient(90deg, #7d97b5, #9db3cc); }
  .day-card.tbd .day-body.empty { text-align: center; color: #b08a3e; padding: 22px 14px; }

  /* 今日 */
  .day-card.today {
    box-shadow: 0 0 0 3px var(--accent), 0 0 24px rgba(255,184,92,0.5);
  }
  .today-badge {
    background: var(--accent); color: #4a3010;
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    padding: 3px 8px; border-radius: 4px;
  }

  .notes {
    margin-top: 34px;
    background: var(--panel-light);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 2px dashed var(--blue-border); border-radius: 18px;
    padding: 16px 18px; font-size: 15px; line-height: 1.9;
  }
  .notes .notes-title {
    font-family: 'Press Start 2P', monospace; font-size: 11px;
    color: #2264a5; margin-bottom: 8px;
  }
  .cta { text-align: center; margin-top: 30px; }

  footer {
    text-align: center; padding: 32px 16px 48px;
    font-size: 14px; color: var(--text-soft);
  }

  @media (max-width: 600px) {
    .schedule-grid { grid-template-columns: 1fr; }
    body { font-size: 16px; }
    .bg-moon {
      width: 60px; height: 60px; top: 4%; right: 5%;
      opacity: 0.35; box-shadow: 0 0 30px rgba(253,246,227,0.2);
    }
  }
</style>
</head>
<body>

      <polygon points="430,220 430,190 500,100 570,190 570,220"/>
      <polygon points="620,220 620,180 675,120 730,180 730,220"/>
      <polygon points="760,220 760,190 830,95 900,190 900,220"/>

</div>

<header>

  <nav>

<main>
  <div class="week-tabs" id="weekTabs"></div>
  <p class="week-range" id="weekRange"></p>
  <div class="schedule-grid" id="scheduleGrid"></div>

  <div class="notes">
    <div class="notes-title">! NOTICE</div>
    ※ 予定は変更になる場合があります。最新情報はXをチェックしてね！<br>

<script>
  // ===== 星 =====
  (function () {
    const field = document.getElementById('starField');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2.5 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 65 + '%';
      star.style.animationDelay = (Math.random() * 3) + 's';
      star.style.animationDuration = (2 + Math.random() * 3) + 's';
      field.appendChild(star);
    }
  })();

  // =====================================================================
  //  スケジュールデータ
  //  「# 」で始まる行 = 新しい週のはじまり
  //    日付を書くとその週として扱う: 「# 2026/7/13 今週」
  //    (週のどの曜日の日付でもOK。自動でその週の月曜に合わせる)
  //    日付を書かない場合、1つ目のブロック = 今日を含む週とみなす
  //  各行の書式:
  //    月 21:00 タイトル                  → 配信あり(24時間表記)
  //    月 9PM タイトル                   → AM/PM表記もOK (9:00PM / 8:00 PM / 9pm)
  //    月 11:30AM 朝枠 9:00PM 夜枠       → 1日に複数枠OK! 時間ごとに区切られる
  //    月 休み                           → お休み
  //    月 未定                           → 完全に未定
  //    月 未定 マイクラかも?              → 時間未定だけどゲームは決まってる
  //  ※「時間」と認識されるのは 21:00 / 11:30AM / 9PM / 8:00 PM のような形。
  //    「9」だけの裸の数字は時間扱いされない(タイトル中の数字と区別するため)。
  //  schedule.txt があればそっちを読む。なければ↓のテキストを使う。
  // =====================================================================
  const FALLBACK_TEXT = `
# 2026/7/13 今週
月 11:30AM キングダムハーツ #9
火 休み
水 11:30AM BG3 9:00PM チラズアート 地獄銭湯 #1
木 11:30AM 【雑談回】線香花火 9:00PM キングダムハーツ #10
金 11:30AM デトロイト #2 9:00PM デトロイト #3
土 12:30PM 黒い砂漠PC　テルミアンSS一回目 8:00PM バイオハザード7 #3
日 8:00PM 参加型配信 FF14 企画決め中

# 2026/7/20 来週
月 12:00PM 海の日長時間配信!【キンハ・ホラー作品予定】
火 11:30AM ポケモン銀 10:00PM キングダムハーツ
水 11:30AM BG3 9:00PM クソデカ囃子
木 11:30AM 【雑談回】マチョリウム 9:00PM キングダムハーツ
金 11:30AM デトロイト #4 9:00PM デトロイト #5
土 8:30PM テルミアンSS2回目 黒い砂漠PC 10:00PM ホラー何かやる
日 12:30PM バイオハザード7 #4
`;

  const DOWS   = ["月", "火", "水", "木", "金", "土", "日"];
  const DOW_EN = ["MON", "TUE", "WED", "THU", "FRI", "SAT", "SUN"];
  const DAY_MS = 24 * 60 * 60 * 1000;

  // 任意の日付 → その週の月曜(0時)
  function snapToMonday(d) {
    const m = new Date(d);
    m.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    m.setHours(0, 0, 0, 0);
    return m;
  }

  // ---- 時間トークンの判定 ----
  const AMPM_RE = /^[AaPp]\.?[Mm]\.?$/;              // "PM" "am" "p.m." など単独
  const NUM_RE  = /^\d{1,2}(?::\d{2})?$/;            // "9" "21:00" "11:30"

  // 行の残り(曜日以降)を複数の枠に分解する
  //   時間っぽいトークンが出るたびに新しい枠が始まる
  function parseSlots(rest) {
    const tokens = rest.split(/\s+/).filter(Boolean); // 全角スペースも\sに含まれる
    const slots = [];
    let cur = null;
    let leading = []; // 最初の時間より前のテキスト

    for (let i = 0; i < tokens.length; i++) {
      const t = tokens[i];
      let time = null;

      // "11:30AM" "9PM" "21:00" のような1トークン完結型
      const attached = t.match(/^(\d{1,2}(?::\d{2})?)([AaPp]\.?[Mm]\.?)$/);
      if (attached) {
        time = t;
      } else if (NUM_RE.test(t)) {
        const hasColon = t.includes(":");
        const nextIsAmPm = i + 1 < tokens.length && AMPM_RE.test(tokens[i + 1]);
        if (nextIsAmPm) {           // "8:00 PM" / "9 pm" → 結合
          time = t + tokens[++i];
        } else if (hasColon) {      // "21:00" 単独 → 24時間表記
          time = t;
        }
        // 裸の数字("9"だけ)は時間扱いしない → タイトルの一部
      }

      if (time !== null) {
        cur = { time: time, titleParts: [] };
        slots.push(cur);
      } else if (cur) {
        cur.titleParts.push(t);
      } else {
        leading.push(t);
      }
    }

    if (!slots.length) return null; // 時間が1つも見つからなかった

    // 最初の時間より前に書かれたテキストは1枠目のタイトルの頭につける
    if (leading.length) slots[0].titleParts = leading.concat(slots[0].titleParts);

    return slots.map(s => ({
      time: s.time,
      title: s.titleParts.join(" ") || "(タイトル未定)"
    }));
  }

  function parseSchedule(text) {
    const weeks = [];
    let cur = null;
    text.split(/\r?\n/).forEach(raw => {
      const line = raw.trim();
      if (!line) return;
      if (line.startsWith("#")) {
        const dm = line.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
        cur = {
          days: Array(7).fill(null),
          start: dm ? snapToMonday(new Date(+dm[1], +dm[2] - 1, +dm[3])) : null
        };
        weeks.push(cur);
        return;
      }
      if (!cur) { cur = { days: Array(7).fill(null), start: null }; weeks.push(cur); }
      const idx = DOWS.indexOf(line[0]);
      if (idx === -1) return; // 曜日で始まらない行は無視
      const rest = line.slice(1).trim();
      if (rest.startsWith("休")) {
        cur.days[idx] = { off: true };
      } else if (rest.startsWith("未定")) {
        cur.days[idx] = { tbd: true, title: rest.slice(2).trim() };
      } else {
        const slots = parseSlots(rest);
        cur.days[idx] = slots ? { slots: slots }
                              : { tbd: true, title: rest }; // 時間が見つからなければ時間未定扱い
      }
    });
    return weeks;
  }

  function init(text) {
    const weeks = parseSchedule(text);
    if (!weeks.length) weeks.push({ days: Array(7).fill(null), start: null });

    // 日本時間の「今日」
    const jstNow = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Tokyo" }));
    const todayIdx = (jstNow.getDay() + 6) % 7; // 月=0 ... 日=6
    const todayMonday = snapToMonday(jstNow);

    // 各週の月曜を確定:
    //   日付が書いてあればそれを使う。なければ「1つ目の週の月曜 + 7日×n」
    const baseMonday = weeks[0].start || todayMonday;
    const starts = weeks.map((wk, w) => {
      if (wk.start) return wk.start;
      const d = new Date(baseMonday);
      d.setDate(baseMonday.getDate() + w * 7);
      return d;
    });

    const fmt = d => (d.getMonth() + 1) + "/" + d.getDate();

    // 今日との関係でタブのラベルを決める
    function weekLabel(start) {
      const diff = Math.round((start - todayMonday) / DAY_MS);
      if (diff === 0)  return "今週";
      if (diff === 7)  return "来週";
      if (diff === 14) return "再来週";
      if (diff === -7) return "先週";
      return fmt(start) + "〜";
    }

    const tabsEl  = document.getElementById("weekTabs");
    const rangeEl = document.getElementById("weekRange");
    const gridEl  = document.getElementById("scheduleGrid");

    function render(w) {
      // タブの見た目
      [...tabsEl.children].forEach((btn, i) =>
        btn.classList.toggle("active", i === w));

      // 日付範囲
      const start = starts[w];
      const end = new Date(start); end.setDate(start.getDate() + 6);
      rangeEl.textContent = "📅 " + fmt(start) + "(月) 〜 " + fmt(end) + "(日)";

      // この週が本当に「今日」を含むか
      const isCurrentWeek = start.getTime() === todayMonday.getTime();

      // カード
      gridEl.innerHTML = "";
      weeks[w].days.forEach((day, i) => {
        const isToday = isCurrentWeek && i === todayIdx;
        let cls = "day-card", body = "";

        if (!day || (day.tbd && !day.title)) {
          cls += " tbd";
          body = '<div class="day-body empty">❓ 未定</div>';
        } else if (day.off) {
          cls += " off";
          body = '<div class="day-body">😴 お休み</div>';
        } else if (day.tbd) {
          cls += " tbd";
          body = `<div class="day-body">
                    <div class="time tbd-time">🕘 時間未定</div>
                    <div class="title">${day.title}</div>
                  </div>`;
        } else {
          body = '<div class="day-body">' + day.slots.map(s => `
                    <div class="slot">
                      <div class="time">🕘 ${s.time}〜</div>
                      <div class="title">${s.title}</div>
                    </div>`).join("") + '</div>';
        }
        if (isToday) cls += " today";

        const card = document.createElement("div");
        card.className = cls;
        card.innerHTML = `
          <div class="day-header">
            <span class="dow">${DOW_EN[i]}</span>
            <span>${DOWS[i]}曜日</span>
            ${isToday ? '<span class="today-badge">TODAY</span>' : ""}
          </div>${body}`;
        gridEl.appendChild(card);
      });
    }

    // タブ生成(週が1つしかなければタブ非表示)
    if (weeks.length > 1) {
      weeks.slice(0, 2).forEach((_, w) => {
        const btn = document.createElement("button");
        btn.className = "pixel-btn";
        btn.textContent = weekLabel(starts[w]);
        btn.addEventListener("click", () => render(w));
        tabsEl.appendChild(btn);
      });
    }
    render(0);
  }

  // schedule.txt を読みに行く → だめならFALLBACK_TEXT
  fetch("schedule.txt", { cache: "no-store" })
    .then(r => r.ok ? r.text() : Promise.reject())
    .then(init)
    .catch(() => init(FALLBACK_TEXT));
</script>

<script src="gummies.js"></script>
</body>
