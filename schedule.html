<script>
  // ===== 週間スケジュール =====
  // ここを毎週書き換えるだけでOK!
  // off: true でお休み / time・title は自由に
  const SCHEDULE = [
    { dow: "MON", label: "月曜日", color: "var(--pink)",   off: false, time: "21:00〜", title: "ゼルダの伝説 初見プレイ #12" },
    { dow: "TUE", label: "火曜日", color: "var(--orange)", off: true },
    { dow: "WED", label: "水曜日", color: "var(--yellow)", off: false, time: "21:00〜", title: "マイクラ ムイピー軍団サーバー建築" },
    { dow: "THU", label: "木曜日", color: "var(--green)",  off: false, time: "22:00〜", title: "ホラーゲーム(タイトルは当日のお楽しみ👻)" },
    { dow: "FRI", label: "金曜日", color: "var(--sky)",    off: true },
    { dow: "SAT", label: "土曜日", color: "var(--purple)", off: false, time: "20:00〜", title: "視聴者参加型!かくれんぼしよう!!" },
    { dow: "SUN", label: "日曜日", color: "var(--pink)",   off: false, time: "15:00〜", title: "雑談&ゲームリクエスト消化" }
  ];

  (function () {
    // ---- 日本時間での「今日」を取得(視聴者がどの国にいてもJST基準) ----
    const jstNow = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Tokyo" }));
    // 月曜はじまりのインデックス (月=0 ... 日=6)
    const todayIdx = (jstNow.getDay() + 6) % 7;

    // ---- 今週の月曜〜日曜を計算して表示 ----
    const monday = new Date(jstNow);
    monday.setDate(jstNow.getDate() - todayIdx);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const fmt = (d) => (d.getMonth() + 1) + "/" + d.getDate();
    document.getElementById("weekRange").textContent =
      "📅 " + fmt(monday) + "(月) 〜 " + fmt(sunday) + "(日)";

    // ---- 曜日カードを生成 ----
    const grid = document.getElementById("scheduleGrid");
    SCHEDULE.forEach((day, i) => {
      const card = document.createElement("div");
      card.className = "day-card" + (day.off ? " off" : "") + (i === todayIdx ? " today" : "");
      card.innerHTML = `
        <div class="day-header" style="background:${day.color}">
          <span class="dow">${day.dow}</span>
          <span>${day.label}</span>
          ${i === todayIdx ? '<span class="today-badge">TODAY</span>' : ""}
        </div>
        <div class="day-body">
          ${day.off
            ? "😴 お休み"
            : `<div class="time">🕘 ${day.time}</div><div class="title">${day.title}</div>`}
        </div>`;
      grid.appendChild(card);
    });
  })();
</script>

<script src="gummies.js"></script>
</body>
